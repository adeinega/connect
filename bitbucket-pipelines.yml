image: atlassian/default-image:2

pipelines:
  branches:
    oid4vc-pipeline-test:
      - step:
          name: build
          services:
            - docker
          script:
            - docker run -v `pwd`:/data danielfett/markdown2rfc openid-4-verifiable-presentations-1_0.md
            - docker run -v `pwd`:/data danielfett/markdown2rfc openid-4-verifiable-credential-issuance-1_0.md
            - docker run -v `pwd`:/data danielfett/markdown2rfc openid-connect-self-issued-v2-1_0.md
            - mv openid-4-verifiable-presentations-*.html openid-4-verifiable-presentations-1_0-test.html
            - mv openid-4-verifiable-credential-issuance-*.html openid-4-verifiable-credential-issuance-1_0-test.html
            - mv openid-connect-self-issued-v2-*.html openid-connect-self-issued-v2-1_0-test.html
          artifacts:
            - '*.html'
            - '*.xml'
      - step:
          name: publish
          clone:
            enabled: false
          script:
            - git config --global user.email "pipeline@bitbucket.org"
            - git config --global user.name "Bitbucket AB/Connect Pipeline"
            - git config --global push.default simple
            - git clone git@bitbucket.org:openid/openid.bitbucket.io.git
            - mkdir -p openid.bitbucket.io/connect/
            - cp *.html openid.bitbucket.io/connect/
            - cd openid.bitbucket.io/connect
            - git add *
            - git commit -m "Update AB/Connect drafts"
            - git push origin master